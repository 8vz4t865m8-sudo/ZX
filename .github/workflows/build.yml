name: Build ZX IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile zxui.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 \
                -isysroot "$SDK" \
                -mios-version-min=13.0 \
                -dynamiclib \
                -fobjc-arc \
                -fobjc-runtime=ios \
                -framework UIKit \
                -framework Foundation \
                -framework CoreGraphics \
                -framework QuartzCore \
                -lobjc \
                -O2 \
                -Wno-deprecated-declarations \
                -Wno-unused-variable \
                -o zxui.dylib \
                zxui.m

      - name: Unpack IPA
        run: unzip -q MyRadar.ipa -d Unpacked

      - name: Copy original fuck.dylib
        run: cp fuck.dylib Unpacked/Payload/MyRadar.app/fuck.dylib

      - name: Copy new zxui.dylib
        run: cp zxui.dylib Unpacked/Payload/MyRadar.app/zxui.dylib

      - name: Install ldid and sign
        run: |
          brew install ldid
          ldid -S Unpacked/Payload/MyRadar.app/MyRadar
          ldid -S Unpacked/Payload/MyRadar.app/fuck.dylib
          ldid -S Unpacked/Payload/MyRadar.app/zxui.dylib

      - name: Repack IPA
        run: |
          cd Unpacked
          zip -qr ../ZX.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZX
          path: ZX.ipa
