name: Build ZX IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- 解压 ----------
      - name: Unpack IPA
        run: unzip -q MyRadar.ipa -d Unpacked

      # ---------- 直接指定可执行文件名称 ----------
      - name: Set environment
        run: |
          echo "APP_NAME=MyRadar.app" >> $GITHUB_ENV
          echo "EXECUTABLE=MyRadar" >> $GITHUB_ENV

      # ---------- 提取真实类名和方法名 ----------
      - name: Extract real names
        id: extract
        run: |
          BINARY="Unpacked/Payload/$APP_NAME/$EXECUTABLE"
          echo "正在分析: $BINARY"
          REAL_CLASS=$(nm -gU "$BINARY" 2>/dev/null | grep "OBJC_CLASS" | grep -E "Controller|View" | head -1 | sed 's/.*_$_//')
          if [ -z "$REAL_CLASS" ]; then
            REAL_CLASS=$(nm -gU "$BINARY" 2>/dev/null | grep "OBJC_CLASS" | head -1 | sed 's/.*_$_//')
          fi
          echo "REAL_CLASS=$REAL_CLASS" >> $GITHUB_ENV
          REAL_AUTH=$(strings "$BINARY" 2>/dev/null | grep -E "build.*Auth|build.*View|setupAuth" | head -1)
          REAL_MAIN=$(strings "$BINARY" 2>/dev/null | grep -E "build.*Main|build.*View|setupMain" | head -1)
          echo "REAL_AUTH=$REAL_AUTH" >> $GITHUB_ENV
          echo "REAL_MAIN=$REAL_MAIN" >> $GITHUB_ENV
          echo "提取的类名: $REAL_CLASS"
          echo "提取的验证方法: $REAL_AUTH"
          echo "提取的主界面方法: $REAL_MAIN"

      # ---------- Patch zxui.m ----------
      - name: Patch zxui.m
        run: |
          if [ -n "$REAL_CLASS" ]; then
            sed -i '' "s/NSClassFromString(@\"ViewController\")/NSClassFromString(@\"$REAL_CLASS\")/g" zxui.m
          fi
          if [ -n "$REAL_AUTH" ]; then
            sed -i '' "s/NSSelectorFromString(@\"buildAuthView\")/NSSelectorFromString(@\"$REAL_AUTH\")/g" zxui.m
          fi
          if [ -n "$REAL_MAIN" ]; then
            sed -i '' "s/NSSelectorFromString(@\"buildMainView\")/NSSelectorFromString(@\"$REAL_MAIN\")/g" zxui.m
          fi

      # ---------- 编译 ----------
      - name: Compile zxui.dylib
        run: |
          clang -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -Wno-deprecated-declarations \
            -Wno-objc-missing-super-calls \
            -Wno-unused-variable \
            -miphoneos-version-min=13.0 \
            -fobjc-arc \
            -dynamiclib \
            zxui.m \
            -o zxui.dylib

      # ---------- 替换 fuck.dylib 并复制 zxui.dylib ----------
      - name: Copy dylibs
        run: |
          cp fuck.dylib "Unpacked/Payload/$APP_NAME/fuck.dylib"
          cp zxui.dylib "Unpacked/Payload/$APP_NAME/zxui.dylib"

      # ---------- 注入 ----------
      - name: Build insert_dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib
          cd insert_dylib
          xcodebuild -target insert_dylib -configuration Release
          sudo cp build/Release/insert_dylib /usr/local/bin/
          cd ..

      - name: Inject dylib
        run: |
          insert_dylib --strip-codesig --inplace \
            "@executable_path/zxui.dylib" \
            "Unpacked/Payload/$APP_NAME/$EXECUTABLE"

      # ---------- 签名 ----------
      - name: Sign
        run: |
          brew install ldid
          ldid -S "Unpacked/Payload/$APP_NAME/$EXECUTABLE"
          ldid -S "Unpacked/Payload/$APP_NAME/fuck.dylib"
          ldid -S "Unpacked/Payload/$APP_NAME/zxui.dylib"

      # ---------- 重打包 ----------
      - name: Repack IPA
        run: |
          cd Unpacked
          zip -qr ../ZX.ipa .

      # ---------- 上传 ----------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZX
          path: ZX.ipa
