name: Build ZX IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- 1. 列出 IPA 结构 ----------
      - name: List IPA structure
        run: |
          echo "=== IPA 文件列表 ==="
          unzip -l MyRadar.ipa | head -30
          echo "=== 解压并查看 Payload ==="
          unzip -q MyRadar.ipa -d Unpacked
          ls -la Unpacked/Payload/
          APP_NAME=$(ls Unpacked/Payload/ | head -1)
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "应用名称: $APP_NAME"
          echo "=== 可执行文件信息 ==="
          cd Unpacked/Payload/$APP_NAME
          EXECUTABLE=$(ls -l | grep -v "\.app" | grep -v "^d" | head -1 | awk '{print $NF}')
          echo "EXECUTABLE=$EXECUTABLE" >> $GITHUB_ENV
          echo "可执行文件: $EXECUTABLE"
          echo "=== 包含的 Objective-C 类（前20个） ==="
          nm -gU "$EXECUTABLE" | grep "OBJC_CLASS" | head -20

      # ---------- 2. 提取真实类名和方法名 ----------
      - name: Extract real names
        id: extract
        run: |
          APP_PATH="Unpacked/Payload/$APP_NAME"
          BINARY="$APP_PATH/$EXECUTABLE"
          REAL_CLASS=$(nm -gU "$BINARY" | grep "OBJC_CLASS" | grep -E "Controller|View" | head -1 | sed 's/.*_$_//')
          if [ -z "$REAL_CLASS" ]; then
            REAL_CLASS=$(nm -gU "$BINARY" | grep "OBJC_CLASS" | head -1 | sed 's/.*_$_//')
          fi
          echo "REAL_CLASS=$REAL_CLASS" >> $GITHUB_ENV
          REAL_AUTH=$(strings "$BINARY" | grep -E "build.*Auth|build.*View|setupAuth" | head -1)
          REAL_MAIN=$(strings "$BINARY" | grep -E "build.*Main|build.*View|setupMain" | head -1)
          echo "REAL_AUTH=$REAL_AUTH" >> $GITHUB_ENV
          echo "REAL_MAIN=$REAL_MAIN" >> $GITHUB_ENV

      # ---------- 3. Patch zxui.m ----------
      - name: Patch zxui.m
        run: |
          if [ -n "$REAL_CLASS" ]; then
            sed -i '' "s/NSClassFromString(@\"ViewController\")/NSClassFromString(@\"$REAL_CLASS\")/g" zxui.m
          fi
          if [ -n "$REAL_AUTH" ]; then
            sed -i '' "s/NSSelectorFromString(@\"buildAuthView\")/NSSelectorFromString(@\"$REAL_AUTH\")/g" zxui.m
          fi
          if [ -n "$REAL_MAIN" ]; then
            sed -i '' "s/NSSelectorFromString(@\"buildMainView\")/NSSelectorFromString(@\"$REAL_MAIN\")/g" zxui.m
          fi

      # ---------- 4. 编译 zxui.dylib ----------
      - name: Compile zxui.dylib
        run: |
          clang -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -Wno-deprecated-declarations \
            -Wno-objc-missing-super-calls \
            -Wno-unused-variable \
            -miphoneos-version-min=13.0 \
            -fobjc-arc \
            -dynamiclib \
            zxui.m \
            -o zxui.dylib

      # ---------- 5. 替换 fuck.dylib 并复制 zxui.dylib ----------
      - name: Copy dylibs
        run: |
          APP_PATH="Unpacked/Payload/$APP_NAME"
          cp fuck.dylib "$APP_PATH/fuck.dylib"
          cp zxui.dylib "$APP_PATH/zxui.dylib"

      # ---------- 6. 注入 zxui.dylib ----------
      - name: Build insert_dylib
        run: |
          git clone https://github.com/tyilo/insert_dylib
          cd insert_dylib
          xcodebuild -target insert_dylib -configuration Release
          sudo cp build/Release/insert_dylib /usr/local/bin/
          cd ..

      - name: Inject dylib
        run: |
          APP_PATH="Unpacked/Payload/$APP_NAME"
          insert_dylib --strip-codesig --inplace \
            "@executable_path/zxui.dylib" \
            "$APP_PATH/$EXECUTABLE"

      # ---------- 7. 签名 ----------
      - name: Sign
        run: |
          brew install ldid
          APP_PATH="Unpacked/Payload/$APP_NAME"
          ldid -S "$APP_PATH/$EXECUTABLE"
          ldid -S "$APP_PATH/fuck.dylib"
          ldid -S "$APP_PATH/zxui.dylib"

      # ---------- 8. 重打包 ----------
      - name: Repack IPA
        run: |
          cd Unpacked
          zip -qr ../ZX.ipa .

      # ---------- 9. 上传 ----------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZX
          path: ZX.ipa
