name: Build ZX IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile zxui.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 \
                -isysroot "$SDK" \
                -mios-version-min=13.0 \
                -dynamiclib \
                -fobjc-arc \
                -fobjc-runtime=ios \
                -framework UIKit \
                -framework Foundation \
                -framework CoreGraphics \
                -framework QuartzCore \
                -lobjc \
                -O2 \
                -Wno-deprecated-declarations \
                -Wno-unused-variable \
                -o zxui.dylib \
                zxui.m

      # 下载 insert_dylib（更可靠的加载命令注入工具）
      - name: Download insert_dylib
        run: |
          curl -L -o insert_dylib.zip https://github.com/tyilo/insert_dylib/releases/download/1.0.0/insert_dylib.zip
          unzip insert_dylib.zip
          chmod +x insert_dylib

      - name: Unpack IPA
        run: unzip -q MyRadar.ipa -d Unpacked

      - name: Copy original fuck.dylib
        run: cp fuck.dylib Unpacked/Payload/MyRadar.app/fuck.dylib

      - name: Copy new zxui.dylib
        run: cp zxui.dylib Unpacked/Payload/MyRadar.app/zxui.dylib

      # 注入加载命令，使 MyRadar 启动时加载 zxui.dylib
      - name: Inject load command
        run: |
          ./insert_dylib @executable_path/zxui.dylib Unpacked/Payload/MyRadar.app/MyRadar --all-yes

      - name: Install ldid and sign
        run: |
          brew install ldid
          ldid -S Unpacked/Payload/MyRadar.app/MyRadar
          ldid -S Unpacked/Payload/MyRadar.app/fuck.dylib
          ldid -S Unpacked/Payload/MyRadar.app/zxui.dylib

      - name: Repack IPA
        run: |
          cd Unpacked
          zip -qr ../ZX.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZX
          path: ZX.ipa
