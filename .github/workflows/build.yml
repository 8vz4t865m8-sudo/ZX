name: Build ZX IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- 1. 编译 zxui.m 生成新的 zxui.dylib ----------
      - name: Compile zxui.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 \
                -isysroot "$SDK" \
                -mios-version-min=13.0 \
                -dynamiclib \
                -fobjc-arc \
                -fobjc-runtime=ios \
                -framework UIKit \
                -framework Foundation \
                -framework CoreGraphics \
                -lobjc \
                -O2 \
                -Wno-deprecated-declarations \
                -Wno-unused-variable \
                -o zxui.dylib \
                zxui.m

      # ---------- 2. 解压原始 IPA ----------
      - name: Unpack IPA
        run: unzip -q MyRadar.ipa -d Unpacked

      # ---------- 3. 复制原有的 fuck.dylib（保持不变） ----------
      - name: Copy original fuck.dylib
        run: cp fuck.dylib Unpacked/Payload/MyRadar.app/fuck.dylib

      # ---------- 4. 复制新编译的 zxui.dylib（新增） ----------
      - name: Copy new zxui.dylib
        run: cp zxui.dylib Unpacked/Payload/MyRadar.app/zxui.dylib

      # ---------- 5. 签名（两个 dylib 和主程序） ----------
      - name: Install ldid and sign
        run: |
          brew install ldid
          ldid -S Unpacked/Payload/MyRadar.app/MyRadar
          ldid -S Unpacked/Payload/MyRadar.app/fuck.dylib
          ldid -S Unpacked/Payload/MyRadar.app/zxui.dylib

      # ---------- 6. 重新打包 IPA ----------
      - name: Repack IPA
        run: |
          cd Unpacked
          zip -qr ../ZX.ipa .

      # ---------- 7. 上传产物 ----------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZX
          path: ZX.ipa
