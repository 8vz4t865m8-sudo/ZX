name: Build ZX IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- 编译 zxui.m 生成 zxui.dylib ----------
      - name: Compile zxui.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 \
                -isysroot "$SDK" \
                -mios-version-min=13.0 \
                -dynamiclib \
                -fobjc-arc \
                -fobjc-runtime=ios \
                -framework UIKit \
                -framework Foundation \
                -framework CoreGraphics \
                -framework QuartzCore \
                -lobjc \
                -O2 \
                -Wno-deprecated-declarations \
                -Wno-unused-variable \
                -o zxui.dylib \
                zxui.m

      # ---------- 解压原始 IPA ----------
      - name: Unpack IPA
        run: unzip -q MyRadar.ipa -d Unpacked

      # ---------- 复制原有验证库（保持不变） ----------
      - name: Copy original fuck.dylib
        run: cp fuck.dylib Unpacked/Payload/MyRadar.app/fuck.dylib

      # ---------- 复制新编译的 zxui.dylib ----------
      - name: Copy new zxui.dylib
        run: cp zxui.dylib Unpacked/Payload/MyRadar.app/zxui.dylib

      # ---------- 签名（主程序 + 两个 dylib） ----------
      - name: Install ldid and sign
        run: |
          brew install ldid
          ldid -S Unpacked/Payload/MyRadar.app/MyRadar
          ldid -S Unpacked/Payload/MyRadar.app/fuck.dylib
          ldid -S Unpacked/Payload/MyRadar.app/zxui.dylib

      # ---------- 重新打包 IPA ----------
      - name: Repack IPA
        run: |
          cd Unpacked
          zip -qr ../ZX.ipa .

      # ---------- 上传产物 ----------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZX
          path: ZX.ipa
