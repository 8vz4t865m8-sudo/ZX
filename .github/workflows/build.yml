name: Build ZX IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack IPA
        run: unzip -q MyRadar.ipa -d Unpacked

      - name: Compile new fuck.dylib
        run: |
          clang -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework UIKit \
            -framework Foundation \
            -miphoneos-version-min=15.0 \
            -fobjc-arc \
            -dynamiclib \
            -o fuck.dylib \
            fuck.m

      - name: Replace fuck.dylib
        run: |
          cp fuck.dylib Unpacked/Payload/MyRadar.app/fuck.dylib

      - name: Sign
        run: |
          brew install ldid
          ldid -S Unpacked/Payload/MyRadar.app/MyRadar
          ldid -S Unpacked/Payload/MyRadar.app/fuck.dylib

      - name: Repack IPA
        run: |
          cd Unpacked
          zip -qr ../ZX.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZX
          path: ZX.ipa
